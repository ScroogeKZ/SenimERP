version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: senimerp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: senimerp_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: senimerp-redis
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ncalayer-mock:
    image: node:20-alpine
    container_name: senimerp-ncalayer-mock
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
    ports:
      - "13579:13579"
    command: node scripts/ncalayer-mock.js
    restart: always

volumes:
  postgres_data:
  redis_data:
